<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryan Byers' Portfolio Website</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="./css/customStyles.css" rel="stylesheet">

<body class="flex-col min-h-screen">
<!-- Hero Section -->
<div class="bg-gradient-hero text-white relative overflow-hidden">
    <div class="container mx-auto px-4 py-16 md:py-18">
        <div class="max-w-3xl mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-6">Ryan Byers</h1>
            <p class="text-xl md:text-2xl mb-8">Computer Science Graduate & Full Stack Software Developer</p>
            <div class="flex justify-center space-x-4">
                <a href="./doc/resume.pdf" class="bg-white text-indigo-600 hover:bg-opacity-90 font-medium px-6 py-3 rounded-lg shadow-md transition-all transform hover:-translate-y-1">View my Resume</a>
                <a href="./doc/diploma.pdf" class="bg-white text-indigo-600 hover:bg-opacity-90 font-medium px-6 py-3 rounded-lg shadow-md transition-all transform hover:-translate-y-1">View my Diploma</a>
            </div>
        </div>
    </div>
</div>

<!-- Header -->
<header class="bg-gradient-navbar shadow-md z-50 transition-all duration-300">
    <div class="mx-auto px-4">
        <div class="flex justify-between items-center py-4">
            <ul class="nav-menu">
                <li><a href="#about" data-page="about.html">About</a></li>
                <li><a href="#projects" data-page="projects.html">Projects</a></li>
                <li><a href="#skills" data-page="skills.html">Skills</a></li>
                <li><a href="#contact" data-page="contact.html">Contact</a></li>
            </ul>

            <button class="md:hidden focus:outline-none" id="menu-toggle">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>

        <!-- Mobile Menu -->
        <div class="hidden md:hidden" id="mobile-menu">
            <ul class="mobile-nav-menu">
                <li><a href="#about" data-page="about.html">About</a></li>
                <li><a href="#projects" data-page="projects.html">Projects</a></li>
                <li><a href="#skills" data-page="skills.html">Skills</a></li>
                <li><a href="#contact" data-page="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</header>

<!-- Main Content Area, content is dynamically loaded in here-->
<div id="content-container"
    class="mx-auto p-10">
    <!-- Loading Placeholder -->
    <div id="loading" class="text-center py-16 hidden">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-500 border-t-transparent"></div>
        <p class="text-gray-600 mt-4">Loading content...</p>
    </div>
</div>
